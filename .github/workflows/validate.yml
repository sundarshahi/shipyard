name: Validate Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate plugin manifest, hooks, and skills
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate plugin.json is valid JSON with required fields
        run: |
          python3 - <<'PY'
          import json, sys
          path = ".claude-plugin/plugin.json"
          with open(path) as f:
              data = json.load(f)
          required = ["name", "description", "version"]
          missing = [k for k in required if not data.get(k)]
          if missing:
              print(f"::error file={path}::missing required fields: {missing}")
              sys.exit(1)
          print(f"plugin.json OK — {data['name']} v{data['version']}")
          PY

      - name: Lint hooks.json
        run: |
          python3 - <<'PY'
          import json, sys
          path = "hooks/hooks.json"
          with open(path) as f:
              data = json.load(f)
          if "hooks" not in data or not isinstance(data["hooks"], dict):
              print(f"::error file={path}::expected a top-level 'hooks' object")
              sys.exit(1)
          print(f"hooks.json OK — {len(data['hooks'])} event group(s)")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Verify skill and agent YAML frontmatter (real parse)
        run: |
          python3 - <<'PY'
          import glob, sys, yaml
          failures = []
          targets = sorted(glob.glob("skills/*/SKILL.md")) + sorted(glob.glob("agents/*.md"))
          if not targets:
              print("::error::no skills/*/SKILL.md or agents/*.md files found")
              sys.exit(1)
          for path in targets:
              with open(path, encoding="utf-8") as f:
                  text = f.read()
              if not text.startswith("---"):
                  failures.append(f"{path}: missing YAML frontmatter")
                  continue
              end = text.find("\n---", 3)
              if end == -1:
                  failures.append(f"{path}: unterminated frontmatter")
                  continue
              raw = text[3:end]
              try:
                  front = yaml.safe_load(raw)
              except yaml.YAMLError as e:
                  failures.append(f"{path}: invalid YAML frontmatter: {e}")
                  continue
              if not isinstance(front, dict):
                  failures.append(f"{path}: frontmatter is not a mapping")
                  continue
              name = front.get("name")
              if not name or not str(name).strip():
                  failures.append(f"{path}: frontmatter missing non-empty 'name'")
              desc = front.get("description")
              if not desc or not str(desc).strip():
                  failures.append(f"{path}: frontmatter missing non-empty 'description'")
              elif len(str(desc)) > 1024:
                  failures.append(f"{path}: description is {len(str(desc))} chars (max 1024)")
          for f in failures:
              print(f"::error::{f}")
          if failures:
              sys.exit(1)
          print(f"All {len(targets)} skill/agent frontmatter blocks are valid")
          PY

      - name: Run claude plugin validate (strict)
        run: |
          if ! command -v claude >/dev/null 2>&1; then
            echo "::error::claude CLI not available — cannot run plugin validate"
            exit 1
          fi
          claude plugin validate . --strict
